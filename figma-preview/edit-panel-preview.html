<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TextCuts Edit Panel Preview</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f3eee5;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-weak: rgba(20, 17, 14, 0.03);
        --ink: #181512;
        --ink-soft: rgba(24, 21, 18, 0.68);
        --ink-faint: rgba(98, 87, 74, 0.5);
        --line: rgba(20, 17, 14, 0.06);
        --accent: #111111;
        --shadow: 0 22px 48px rgba(33, 28, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;
        font-family: "IBM Plex Sans", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 28%),
          linear-gradient(180deg, #f5f0e8 0%, #f0ebdf 100%);
        color: var(--ink);
      }

      .artboard {
        width: 1320px;
        padding: 28px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 16px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: var(--panel-weak);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .tabs,
      .actions,
      .position-grid {
        display: flex;
        gap: 8px;
      }

      .tabs {
        align-items: center;
      }

      .pill,
      .action,
      .position {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        min-height: 40px;
        padding: 0 16px;
        border: 1px solid transparent;
        background: rgba(20, 17, 14, 0.04);
        color: rgba(98, 87, 74, 0.58);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .pill {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 10px;
        font-size: 10px;
      }

      .active {
        background: var(--accent);
        color: #fff;
      }

      .actions .action {
        flex: 1;
      }

      .divider {
        height: 1px;
        background: var(--line);
      }

      .control-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 14px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid rgba(20, 17, 14, 0.05);
        box-shadow: 0 4px 14px rgba(20, 17, 14, 0.04);
      }

      .meta-row,
      .range-values {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .label,
      .range-values {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-faint);
      }

      .value-pill {
        padding: 6px 9px;
        border-radius: 999px;
        background: rgba(20, 17, 14, 0.04);
        color: rgba(24, 21, 18, 0.68);
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .slider-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .slider {
        position: relative;
        height: 18px;
        display: flex;
        align-items: center;
      }

      .slider-track,
      .slider-fill {
        height: 3px;
        border-radius: 999px;
      }

      .slider-track {
        width: 100%;
        background: rgba(20, 17, 14, 0.08);
      }

      .slider-fill {
        position: absolute;
        left: 0;
        width: 58%;
        background: var(--accent);
      }

      .slider-thumb {
        position: absolute;
        left: 58%;
        width: 14px;
        height: 14px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.08);
      }

      .position-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .position-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }

      .position {
        min-height: 38px;
        font-size: 10px;
      }

      .position:not(.active) {
        border-color: rgba(20, 17, 14, 0.05);
      }

      .footer-note {
        margin-top: 6px;
        font-size: 15px;
        line-height: 1.6;
        color: var(--ink-soft);
      }
    </style>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <main id="capture-root" class="artboard">
      <section class="panel stack">
        <div class="tabs">
          <div class="pill">Style</div>
          <div class="pill active">Edit</div>
          <div class="pill">Source</div>
        </div>

        <div class="actions">
          <div class="action">Switch Layout</div>
          <div class="action">Bold Text</div>
          <div class="action">Add Image</div>
        </div>

        <div class="action">Upload Avatar</div>

        <div class="divider"></div>

        <div class="control-card">
          <div class="meta-row">
            <div class="label">Zoom</div>
            <div class="value-pill">1.4x</div>
          </div>

          <div class="slider-stack">
            <div class="slider">
              <div class="slider-track"></div>
              <div class="slider-fill"></div>
              <div class="slider-thumb"></div>
            </div>
            <div class="range-values">
              <span>0.2</span>
              <span>3.0</span>
            </div>
          </div>

          <div class="divider"></div>

          <div class="position-group">
            <div class="label">Position</div>
            <div class="position-grid">
              <div class="position active">Top</div>
              <div class="position">Bottom</div>
              <div class="position">Left</div>
              <div class="position">Right</div>
            </div>
          </div>
        </div>

        <p class="footer-note">
          这版把 slider 和位置按钮收成同一个控制组，让它们在视觉上成为同一个任务块，而不是两层互相挤压的控件。
        </p>
      </section>
    </main>
  </body>
</html>
